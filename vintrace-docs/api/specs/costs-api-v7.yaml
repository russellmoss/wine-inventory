openapi: 3.0.3
info:
  title: Vintrace Costs API
  description: ''
  version: 1.0.0
servers:
  - url: 'https://oz50.vintrace.net/vinx2/api/v7/costs'
    description: Example production url
  - url: 'https://sandbox.vintrace.net/vinx2demo/api/v7/costs'
    description: Example sandbox url
security:
  - bearerAuth: []
paths:
  /business-unit-transactions:
    parameters:
      - $ref: '#/components/parameters/CorrelationId'
    get:
      summary: Return bulk wine cost movements between two dates
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/BusinessUnit'
        - $ref: '#/components/parameters/WineryName'
        - $ref: '#/components/parameters/WineryId'
      responses:
        '200':
          description: Success
          headers:
            correlation-id:
              description: Unique identifier associated with the transaction
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBusinessUnitTransactionsResponse'
              examples:
                successBusinessUnitTransactionsResponse:
                  value:
                    totalResults: 120
                    offset: 0
                    limit: 2
                    first: /mob/api/v7/costs/business-unit-transactions?endDate=1667192283000&startDate=1664600283000&limit=2&offset=0
                    previous: null
                    next: /mob/api/v7/costs/business-unit-transactions?endDate=1667192283000&startDate=1664600283000&limit=2&offset=2
                    last: /mob/api/v7/costs/business-unit-transactions?endDate=1667192283000&startDate=1664600283000&limit=2&offset=120
                    result:
                      - activityId: 'OP:29086'
                        postedId: 8260
                        resultOfCorrection: false
                        activityType: Movement out (Inter-winery)
                        primaryCostTarget: CH 20 Z
                        secondaryCostTarget: CH 20 F
                        activitySummary: Transfer 15 gal of CH 20 Z from 0108Z to CH 20 F in 0002F
                        activityDate: 1665285480000
                        postedDate: 1665285555000
                        primaryWinery:
                          id: 1
                          name: Z Winery
                          businessUnit: Z24
                        secondaryWinery:
                          id: 6
                          name: F Winery
                          businessUnit: F22
                        location: ZW
                        vessel: 0108Z
                        wineBatch: CH 20 Z
                        productCategory:
                          id: 71
                          name: Bulk Market White
                          code: BMW
                        program:
                          id: 33
                          name: Premium Chardonnay
                          code: PRCH
                        volumeDelta:
                          unit: gal
                          value: -15
                        costDelta:
                          total: -579.610194
                          fruit: 171.829951
                          overhead: -51.918786
                          storage: 0
                          additive: 0
                          bulk: 0
                          packaging: 0
                          operation: -163.325534
                          freight: 0
                          other: -536.195825
                        customer: null
                        vendor: null
                        lossReason: null
                        allocationDescription: '15 gal of 2020 FRANCIS GULLY from 0108Z, +15 gal of 2020 FRANCIS GULLY to 0002F'
                        impactedAllocations:
                          - productName: FRANCIS GULLY
                            vintage: '2020'
                            itemCode: 20FGULLY
                            name: 2020 FRANCIS GULLY
                        references:
                          bulkSalesOrder: null
                          bulkPurchaseOrder: null
                          externalWorkOrder: null
                          workOrder: TWL7177
