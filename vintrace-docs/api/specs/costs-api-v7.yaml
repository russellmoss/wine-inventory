                          id: 33
                          name: Premium Chardonnay
                          code: PRCH
                        volumeDelta:
                          unit: gal
                          value: 15
                        costDelta:
                          total: 579.610194
                          fruit: -171.829951
                          overhead: 51.918786
                          storage: 0
                          additive: 0
                          bulk: 0
                          packaging: 0
                          operation: 163.325534
                          freight: 0
