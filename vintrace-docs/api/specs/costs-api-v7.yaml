                        postedId: 8261
                        resultOfCorrection: false
                        activityType: Movement in (Inter-winery)
                        primaryCostTarget: CH 20 F
                        secondaryCostTarget: CH 20 Z
                        activitySummary: Transfer 15 gal of CH 20 Z from 0108Z to CH 20 F in 0002F
                        activityDate: 1665285480000
                        postedDate: 1665285555000
                        primaryWinery:
                          id: 6
                          name: F Winery
                          businessUnit: F22
                        secondaryWinery:
                          id: 1
                          name: Z Winery
                          businessUnit: Z24
                        location: FW
                        vessel: 0002F
                        wineBatch: CH 20 F
                        productCategory:
                          id: 71
                          name: Bulk Market White
                          code: BMW
