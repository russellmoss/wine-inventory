<!-- @dsCard group="Slides" viewport="1280x720" name="Section divider" subtitle="Big serif number + section title" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="./slide-base.css" />
<style>
  html, body { margin: 0; }
  .sec__pad { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 60px; }
  .sec__left { display: flex; flex-direction: column; align-items: flex-start; gap: 24px; max-width: 620px; }
  .sec__num { font-family: var(--font-display); font-size: 240px; line-height: 0.8; color: var(--savvy-gold); }
  .sec__title { font-family: var(--font-heading); font-weight: 300; font-size: 56px; letter-spacing: -0.02em; line-height: 1.05; }
  .sec__art { height: 360px; opacity: 0.95; }
</style>
</head>
<body>
  <section class="slide cream">
    <div class="slide__brand"><img src="../assets/logos/savvy-wordmark-black.png" alt="Savvy" /></div>
    <div class="slide__pad sec__pad">
      <div class="sec__left">
        <div class="slide__eyebrow">Section 02</div>
        <div class="sec__num">02</div>
        <h2 class="sec__title">How we put advisors first</h2>
      </div>
      <img class="sec__art" src="../assets/illustrations/gold/concentric.png" alt="" />
    </div>
    <div class="slide__page">23</div>
  </section>
</body>
</html>
