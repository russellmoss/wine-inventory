<!-- @dsCard group="Slides" viewport="1280x720" name="Quote" subtitle="Testimonial / mission — dark register" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="./slide-base.css" />
<style>
  html, body { margin: 0; background: #111; }
  .q__pad { justify-content: center; align-items: flex-start; }
  .q__mark { height: 70px; margin-bottom: 34px; }
  .q__text { font-family: var(--font-display); font-weight: 400; font-size: 46px; line-height: 1.3; max-width: 940px; color: var(--text-on-dark); }
  .q__text em { font-style: normal; color: var(--savvy-ecru); }
  .q__by { margin-top: 40px; display: flex; flex-direction: column; gap: 4px; }
  .q__name { font-family: var(--font-body); font-size: 19px; font-weight: 600; color: var(--text-on-dark); }
  .q__role { font-family: var(--font-body); font-size: 16px; color: var(--text-on-dark-muted); }
</style>
</head>
<body>
  <section class="slide dark">
    <div class="slide__pad q__pad">
      <img class="q__mark" src="../assets/illustrations/quote-white.png" alt="" />
      <div class="q__text">Savvy gave our advisors their time back — so the <em>relationship</em>, not the paperwork, stays at the center of every conversation.</div>
      <div class="q__by">
        <div class="q__name">Maya Iyer</div>
        <div class="q__role">Founder, Iyer Wealth</div>
      </div>
    </div>
    <div class="slide__page">138</div>
  </section>
</body>
</html>
