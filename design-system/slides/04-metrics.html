<!-- @dsCard group="Slides" viewport="1280x720" name="Metrics" subtitle="Three big figures with captions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="./slide-base.css" />
<style>
  html, body { margin: 0; }
  .mx__head { display: flex; flex-direction: column; align-items: flex-start; gap: 18px; max-width: 720px; }
  .mx__row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 56px; margin-top: 84px; }
  .mx__item { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
  .mx__rule { width: 44px; height: 3px; background: var(--accent); }
  .mx__num { font-family: var(--font-heading); font-weight: 200; font-size: 92px; line-height: 0.95; letter-spacing: -0.03em; }
  .mx__cap { font-family: var(--font-body); font-size: 18px; color: var(--text-muted); }
</style>
</head>
<body>
  <section class="slide">
    <div class="slide__brand"><img src="../assets/logos/savvy-wordmark-black.png" alt="Savvy" /></div>
    <div class="slide__pad">
      <div class="mx__head">
        <div class="slide__eyebrow">By the numbers</div>
        <h2 class="slide__title" style="font-size:48px">Built on trust, measured in time</h2>
      </div>
      <div class="mx__row">
        <div class="mx__item"><div class="mx__rule"></div><div class="mx__num">$2.4B</div><div class="mx__cap">Assets under advisement</div></div>
        <div class="mx__item"><div class="mx__rule"></div><div class="mx__num">98%</div><div class="mx__cap">Client retention</div></div>
        <div class="mx__item"><div class="mx__rule"></div><div class="mx__num">12<span style="font-family:var(--font-display);font-size:0.5em;"> yrs</span></div><div class="mx__cap">Average advisor tenure</div></div>
      </div>
    </div>
    <div class="slide__page">76</div>
  </section>
</body>
</html>
