<!-- @dsCard group="Slides" viewport="1280x720" name="Agenda" subtitle="Numbered section list" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="./slide-base.css" />
<style>
  html, body { margin: 0; }
  .ag__grid { display: grid; grid-template-columns: 360px 1fr; gap: 80px; height: 100%; align-items: center; }
  .ag__left { display: flex; flex-direction: column; align-items: flex-start; gap: 22px; }
  .ag__art { height: 200px; opacity: 0.95; }
  .ag__list { display: flex; flex-direction: column; }
  .ag__item { display: flex; align-items: baseline; gap: 26px; padding: 22px 0; border-top: 1px solid var(--border-default); }
  .ag__item:last-child { border-bottom: 1px solid var(--border-default); }
  .ag__n { font-family: var(--font-display); font-size: 22px; color: var(--savvy-gold); width: 42px; flex: none; }
  .ag__t { font-family: var(--font-heading); font-weight: 300; font-size: 30px; letter-spacing: -0.01em; }
</style>
</head>
<body>
  <section class="slide cream">
    <div class="slide__brand"><img src="../assets/logos/savvy-wordmark-black.png" alt="Savvy" /></div>
    <div class="slide__pad">
      <div class="ag__grid">
        <div class="ag__left">
          <div class="slide__eyebrow">Agenda</div>
          <h2 class="slide__title" style="font-size:52px">What we'll cover</h2>
          <img class="ag__art" src="../assets/illustrations/gold/globe-striped.png" alt="" />
        </div>
        <div class="ag__list">
          <div class="ag__item"><span class="ag__n">01</span><span class="ag__t">The case for a calmer wealth experience</span></div>
          <div class="ag__item"><span class="ag__n">02</span><span class="ag__t">How we put advisors first</span></div>
          <div class="ag__item"><span class="ag__n">03</span><span class="ag__t">The platform, end to end</span></div>
          <div class="ag__item"><span class="ag__n">04</span><span class="ag__t">Results &amp; what's next</span></div>
        </div>
      </div>
    </div>
    <div class="slide__page">23</div>
  </section>
</body>
</html>
