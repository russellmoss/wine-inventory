<!-- @dsCard group="Brand" viewport="700x170" name="Quote mark & arrow" subtitle="Oversized serif quote graphic + gold directional arrow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; background: var(--surface-page); }
  .wrap { display: flex; height: 170px; align-items: center; }
  .cell { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .cell.line { border-right: 1px solid var(--border-subtle); }
  .cell img.q { height: 70px; }
  .cell img.a { height: 30px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cell line"><img class="q" src="../assets/illustrations/quote-gold.png" alt="quote" /><div class="cap">Quote mark</div></div>
    <div class="cell"><img class="a" src="../assets/illustrations/arrow-gold.png" alt="arrow" /><div class="cap">Directional arrow</div></div>
  </div>
</body>
</html>
