<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="8px base grid — space-1 through space-10" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-page); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { text-align: center; }
  .bar { background: var(--accent-soft); border: 1px solid var(--savvy-gold); border-radius: var(--radius-xs); }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="lab">1·4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="lab">2·8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="lab">3·12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="lab">4·16</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="lab">5·24</div></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="lab">6·32</div></div>
    <div class="item"><div class="bar" style="width:40px;height:40px"></div><div class="lab">7·40</div></div>
    <div class="item"><div class="bar" style="width:56px;height:56px"></div><div class="lab">8·56</div></div>
    <div class="item"><div class="bar" style="width:72px;height:72px"></div><div class="lab">9·72</div></div>
  </div>
</body>
</html>
