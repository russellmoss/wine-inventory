<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & caption" subtitle="Uppercase tracked label + small captions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-page); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .eyebrow { font-family: var(--font-body); font-weight: 500; text-transform: uppercase; letter-spacing: 0.16em; font-size: 12px; color: var(--text-accent); }
  .cap { font-family: var(--font-body); font-size: 13px; color: var(--text-muted); }
  .num { font-family: var(--font-display); font-size: 13px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="eyebrow">What it includes</div>
    <div class="cap">Caption goes here · supporting detail set in Inter at 13px</div>
    <div class="meta">.savvy-eyebrow · uppercase · tracking 0.16em · --text-accent</div>
  </div>
</body>
</html>
