<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-page); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-subtle); padding: 7px 0; }
  .spec { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); width: 120px; flex: none; }
  .samp { font-family: var(--font-heading); font-weight: 300; color: var(--text-primary); letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
</style>
</head>
<body>
  <div class="line"><div class="spec">display-2xl · 88</div><div class="samp" style="font-size:46px">Savvy</div></div>
  <div class="line"><div class="spec">display-lg · 52</div><div class="samp" style="font-size:38px">Quiet confidence</div></div>
  <div class="line"><div class="spec">h1 · 40</div><div class="samp" style="font-size:32px">A smarter home for your wealth</div></div>
  <div class="line"><div class="spec">h2 · 32</div><div class="samp" style="font-size:26px">Advisors and technology</div></div>
  <div class="line"><div class="spec">h3 · 25</div><div class="samp" style="font-size:21px">Working as one</div></div>
  <div class="line"><div class="spec">body · 16</div><div class="samp" style="font-family:var(--font-body);font-weight:400;font-size:16px;letter-spacing:0">The relationship at the center.</div></div>
  <div class="line" style="border:none"><div class="spec">caption · 13</div><div class="samp" style="font-family:var(--font-body);font-weight:400;font-size:13px;letter-spacing:0;color:var(--text-muted)">Supporting detail</div></div>
</body>
</html>
