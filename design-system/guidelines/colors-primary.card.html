<!-- @dsCard group="Colors" viewport="700x170" name="Primary palette" subtitle="White · Vanilla · Ecru · Savvy Gold · Black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 70px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .name { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text-primary); margin-top: 10px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--savvy-white)"></div><div class="name">White</div><div class="hex">#FFFFFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--savvy-vanilla)"></div><div class="name">Vanilla</div><div class="hex">#FFF8F1</div></div>
    <div class="sw"><div class="chip" style="background:var(--savvy-ecru)"></div><div class="name">Ecru</div><div class="hex">#C7BCA1</div></div>
    <div class="sw"><div class="chip" style="background:var(--savvy-gold)"></div><div class="name">Savvy Gold</div><div class="hex">#8E7E57</div></div>
    <div class="sw"><div class="chip" style="background:var(--savvy-black)"></div><div class="name">Black</div><div class="hex">#000000</div></div>
  </div>
</body>
</html>
