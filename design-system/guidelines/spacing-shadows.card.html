<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation / shadows" subtitle="Warm, low, brown-tinted — never blue" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 26px; background: var(--surface-page); }
  .row { display: flex; gap: 26px; }
  .item { text-align: center; }
  .box { width: 96px; height: 64px; background: var(--surface-raised); border-radius: var(--radius-md); }
  .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lab">xl</div></div>
  </div>
</body>
</html>
