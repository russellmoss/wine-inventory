<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="xs 4 · sm 6 · md 10 · lg 16 · xl 24 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-page); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 72px; height: 60px; background: var(--surface-raised); border: 1px solid var(--border-strong); box-shadow: var(--shadow-sm); }
  .lab { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lab">xs · 4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm · 6</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md · 10</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · 16</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">xl · 24</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lab">pill</div></div>
  </div>
</body>
</html>
