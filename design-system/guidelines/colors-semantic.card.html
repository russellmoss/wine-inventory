<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & status" subtitle="Accent and status roles drawn from the brand palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-page); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); display: flex; align-items: flex-end; padding: 8px; }
  .name { font-family: var(--font-body); font-size: 12.5px; font-weight: 600; color: var(--text-primary); margin-top: 8px; }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">Accent</div><div class="tok">--accent</div></div>
    <div class="sw"><div class="chip" style="background:var(--positive)"></div><div class="name">Positive</div><div class="tok">--positive</div></div>
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="name">Info</div><div class="tok">--info</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="name">Warning</div><div class="tok">--warning</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="name">Danger</div><div class="tok">--danger</div></div>
  </div>
</body>
</html>
