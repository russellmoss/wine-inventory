<!-- @dsCard group="Components" viewport="700x430" name="Buttons, Badges, Avatars" subtitle="Core action + label primitives" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--surface-page); }
  .group { margin-bottom: 22px; }
  .lbl { font-family: var(--font-body); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Badge, Avatar } = window.SavvyDesignSystem_9598d9;
    const Arrow = () => <span style={{fontSize:'1.1em',lineHeight:0}}>→</span>;
    function Demo() {
      return (
        <div>
          <div className="group">
            <div className="lbl">Button — variants</div>
            <div className="row">
              <Button variant="primary">Book a call</Button>
              <Button variant="secondary">Learn more</Button>
              <Button variant="ghost" iconRight={<Arrow />}>See the plan</Button>
              <Button variant="link">View disclosures</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>
          <div className="group">
            <div className="lbl">Button — sizes</div>
            <div className="row">
              <Button size="sm" variant="secondary">Small</Button>
              <Button size="md" variant="secondary">Medium</Button>
              <Button size="lg" variant="primary">Large</Button>
            </div>
          </div>
          <div className="group">
            <div className="lbl">Badge</div>
            <div className="row">
              <Badge tone="gold">Featured</Badge>
              <Badge tone="green" variant="solid">Active</Badge>
              <Badge tone="blue">Managed</Badge>
              <Badge tone="maroon" variant="outline">Private</Badge>
              <Badge tone="gold" uppercase>Spotlight</Badge>
            </div>
          </div>
          <div className="group" style={{marginBottom:0}}>
            <div className="lbl">Avatar</div>
            <div className="row">
              <Avatar name="Maya Iyer" tone="gold" />
              <Avatar name="Theo Park" tone="green" />
              <Avatar name="Rae Okafor" tone="blue" size={48} />
              <Avatar name="Jon Vance" tone="maroon" size={32} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
