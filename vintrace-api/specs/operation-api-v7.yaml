          description: The gross weight of the fruit for this weight event
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
        tare:
          description: The tare weight of the truck/bins for this weight event
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
