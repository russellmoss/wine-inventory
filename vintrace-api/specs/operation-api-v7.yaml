          in: query
          required: false
          schema:
            type: string
            example: 'Barrel Check,Move barrel 1'
          description: |
            Filter the barrel treatment by the name of treatment type. Case sensitive.

            Note, comma is used as delimiter in this param and will conflict if the name has a comma.
