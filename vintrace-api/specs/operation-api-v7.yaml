  /work-orders:
    get:
      summary: Get all the work orders in the system
      description: Return all work orders matching the supplied query param conditions
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/PaginationOffset'
        - $ref: '#/components/parameters/PaginationLimit'
        - name: scheduledSince
          in: query
          required: false
          schema:
            type: integer
            format: int64
            example: 164876284000
          description: Only include work orders that are scheduled since the provided time stamp. The value is required to be in epoch milliseconds and inclusive.
        - name: scheduledBefore
          in: query
          required: false
          schema:
            type: integer
            format: int64
            example: 164876284000
          description: Only include work orders that are scheduled before the provided time stamp. The value is required to be in epoch milliseconds and inclusive.
        - name: status
          in: query
          required: false
          schema:
            type: string
            example: 'READY,IN_PROGRESS'
          description: |
            Only include work orders that are in the provided status list.

            Support multiple types delimited by comma.
        - name: operationTypes
          in: query
          required: false
          schema:
            type: string
            example: 'TIRAGE,BULK_DISPATCH'
          description: |
            Only include work orders that have the type of winery jobs in the provided list.

            Support multiple types delimited by comma.
