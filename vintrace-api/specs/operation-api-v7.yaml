          type: array
          items:
            type: object
            allOf:
              - $ref: common-schemas.yaml#/components/schemas/AnalysisResult
    UpdateMetricsResponse:
      description: Response object for updating metrics
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/UpdateMetrics'
    BulkIntakeRequest:
      type: object
      required:
        - occurredTime
        - wineDetails
        - composition
        - cost
      properties:
        occurredTime:
          description: The occurrence time of this intake
          type: integer
          format: int64
        wineDetails:
          $ref: '#/components/schemas/WineDetailsInRequest'
        composition:
          type: array
          items:
            $ref: '#/components/schemas/Composition'
        cost:
          $ref: '#/components/schemas/Cost'
        deliveryDetails:
          $ref: '#/components/schemas/DeliveryDetails'
        metrics:
          description: an array of analysis results for the received fruit
          type: array
          items:
            type: object
            allOf:
              - $ref: common-schemas.yaml#/components/schemas/AnalysisResult
    BulkIntake:
      type: object
      required:
        - occurredTime
        - wineDetails
        - composition
        - cost
      properties:
        id:
          type: integer
        occurredTime:
          description: The occurrence time of this intake
          type: integer
          format: int64
        reversed:
          description: Indicate if the record has been reversed
          type: boolean
        wineDetails:
          $ref: '#/components/schemas/WineDetails'
        composition:
          type: array
          items:
            $ref: '#/components/schemas/Composition'
        cost:
          $ref: '#/components/schemas/Cost'
        deliveryDetails:
          $ref: '#/components/schemas/DeliveryDetails'
        metrics:
          description: an array of analysis results for the received fruit
          type: array
          items:
            type: object
            allOf:
              - $ref: common-schemas.yaml#/components/schemas/AnalysisResult
    WineDetails:
      type: object
      required:
        - batch
        - volume
        - productType
        - fractionType
        - fermentState
        - beverageType
      properties:
        vessel:
          description: The destination vessel that the wine is allocated to.
          type: string
        batch:
          description: the batch that the vessel belongs to
          type: string
        ownership:
          description: The ownership of this wine. Can contain multiple ownerships.
          type: array
          items:
            $ref: '#/components/schemas/Ownership'
        volume:
          description: The total volume of this intake.
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
        fractionType:
          $ref: '#/components/schemas/FractionType'
        fermentState:
          $ref: '#/components/schemas/FermentState'
        malolacticState:
          $ref: '#/components/schemas/FermentState'
        beverageType:
          description: 'The beverage type. E.g Red, Rose or Sparkling'
          type: string
        productType:
          $ref: '#/components/schemas/ProductType'
        reference:
          description: The reference of this wine
          type: string
        yieldRate:
          description: The yield rate of the wine
          type: number
        batchOwner:
          description: The owner of the batch
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
    WineDetailsInRequest:
      allOf:
        - $ref: '#/components/schemas/WineDetails'
      properties:
        virtualVessel:
          description: |
            This flag indicates whether the received wine will be allocated to a virtual vessel in system. 

            When this field is true, vessel is not required.
          type: boolean
          default: false
        winery:
          description: The winery that owns the liquid and batch. Mandatory if virtualVessel flag is true.
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Winery
    Ownership:
      type: object
      properties:
        owner:
          $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        percentage:
          type: number
          format: double
    FractionType:
      type: string
      enum:
        - FREE_RUN
        - PRESSINGS
        - MUST
        - LEES
        - UNKNOWN
        - COMBINED
        - CONDENSATE
        - PRESSINGS_LIGHT
        - PRESSINGS_HEAVY
        - DRAININGS
        - PRESSINGS_OVERNIGHT
        - SAIGNEE
    ProductType:
      description: The product type. Default to LIQUID if not provided.
      type: string
      default: LIQUID
      enum:
        - LIQUID
        - NEUTRAL_CONDENSATE
    FermentState:
      type: string
      enum:
        - UNFERMENTED
        - STARTED
        - STOPPED
    BookingState:
      description: The booking state.
      type: string
      enum:
        - Scheduled
        - Underway
        - Completed
        - Confirmed
    Composition:
      type: object
      required:
        - percentage
        - vintage
      properties:
        percentage:
          type: number
          format: double
        weighting:
          type: number
          format: double
        vintage:
          type: integer
        block:
          description: The block. Mandatory if the other details like region and variety are not provided.
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        region:
          description: Mandatory if block is not provided
          allOf:
            - $ref: '#/components/schemas/CodeableEntity'
        subRegion:
          description: Mandatory if block is not provided
          allOf:
            - $ref: '#/components/schemas/CodeableEntity'
        variety:
          description: Mandatory if block is not provided
          allOf:
            - $ref: '#/components/schemas/CodeableEntity'
        componentVolume:
          $ref: common-schemas.yaml#/components/schemas/Measurement
    CodeableEntity:
      description: Represents an entity at vintrace that contains a code
      allOf:
        - $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
      properties:
        code:
          description: The code associated with this entity
          type: string
    Cost:
      type: object
      properties:
        amount:
          description: The numerical value of the cost amount
          type: number
          format: double
        rate:
          description: The rate of the cost amount. e.g Total
          type: string
          enum:
            - TOTAL
            - PER_LITRE
            - PER_GALLON_US
        freight:
          description: The cost of freight
          type: number
          format: double
        ttbDetails:
          description: The TTB details for this wine as of the report date. Mandatory for customer in USA.
          allOf:
            - $ref: '#/components/schemas/TaxDetails'
    TaxDetails:
      description: 'Bond, tax state and tax class information'
      type: object
      required:
        - taxState
      properties:
        bond:
          description: The bonded wine facility the wine is stored at
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        taxState:
          description: The bonded status of the wine
          type: string
          enum:
            - BONDED
            - TAXPAID
            - NON_DECLARED
        taxClass:
          description: The TTB tax class for the wine
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
          properties:
            federalName:
              description: The federal tax class name
              type: string
            stateName:
              description: The state tax class name
              type: string
        alcoholPercentage:
          description: The alcohol percentage of the liquid
          type: number
          format: double
    DeliveryDetails:
      properties:
        purchaseOrder:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        receivedFrom:
          $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        carrier:
          $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        shippingRefNo:
          description: The reference number of this shipment
          type: string
        truckNo:
          description: The truck number
          type: string
        driverName:
          description: The driver name
          type: string
        sealNo:
          description: The seal number
          type: string
        compartmentNo:
          description: The compartment number
          type: string
        cipNo:
          description: The CIP number
          type: string
        container:
          description: The container
          type: string
        customsEntryNumber:
          description: The custom entry number
          type: string
        purchaseReference:
          description: Purchase reference
          type: string
        deliveryState:
          description: The state of this liquid delivery
          type: string
          enum:
            - IN_TRANSIT
            - ON_DOCK
            - RECEIVED
    CreateBulkIntakeSuccessResponse:
      description: The response object when successfully creating a fruit intake
      properties:
        data:
          $ref: '#/components/schemas/BulkIntake'
    GetBulkIntakesSuccessResponse:
      type: object
      allOf:
        - $ref: common-schemas.yaml#/components/schemas/Shared-openapi_PageRoot
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/BulkIntake'
    GetTrialBlendsSuccessResponse:
      type: object
      allOf:
        - $ref: common-schemas.yaml#/components/schemas/Shared-openapi_PageRoot
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/TrialBlend'
    TrialBlend:
      description: Trial blend object.
      properties:
        reference:
          description: The internal reference number that uniquely identifies this trial blend
          type: string
        name:
          type: string
        description:
          type: string
        year:
          type: string
        winery:
          description: The winery of this trial blend
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Winery
        operator:
          description: The operator who created this trial blend in system.
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        trialDate:
          description: The time when this trial blend is recorded in system. Time is returned in epoch milliseconds
          type: integer
          format: int64
        modifiedTime:
          description: The last modified time of this trial blend
          type: integer
          format: int64
        cost:
          description: The calculated cost in dollar of this trial blend
          type: number
          format: double
        amount:
          description: The amount of this trial blend
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
        sampleVolume:
          description: The volume of the sample in this trial blend
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
        status:
          description: The status of this trial blend
          type: string
          enum:
            - DRAFT
            - FINAL
            - REQUEST_APPROVAL
            - APPROVED
        composition:
          description: The composition of this trial blend
          type: object
          properties:
            summary:
              type: array
              items:
                $ref: '#/components/schemas/CompositionSummary'
    CompositionSummary:
      type: object
      properties:
        type:
          description: The type that the composition is summarised by. E.g vintage
          type: string
        elements:
          description: The collection that contains the summarised data
          type: array
          items:
            type: object
            properties:
              name:
                description: The name of this composition element.
                type: string
              percentage:
                description: The percentage of this composition type.
                type: number
                format: double
    GetWorkOrdersSuccessResponse:
      type: object
      allOf:
        - $ref: common-schemas.yaml#/components/schemas/Shared-openapi_PageRoot
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/WorkOrder'
    WorkOrder:
      description: Represents a work order
      required:
        - id
        - name
        - issuedBy
        - status
        - scheduledTime
      properties:
        id:
          description: The unique identifier of this work order. Generated by vintrace
          type: integer
        name:
          description: The human readable work order number.
          type: string
        assignedTo:
          description: The user whom this work order is assigned to execute
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        issuedBy:
          description: The user who creates this work order
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        status:
          description: The status of this work order
          type: string
          enum:
            - DRAFT
            - READY
            - IN_PROGRESS
            - SUBMITTED
            - COMPLETED
            - CANCELLED
            - REPLAY
        scheduledTime:
          description: When this work order is scheduled for
          type: integer
          format: int64
        summary:
          description: The work order summary
          type: string
        jobs:
          description: The work order jobs scheduled in this work order
          type: array
          items:
            anyOf:
              - $ref: '#/components/schemas/WineryWorkOrderJob'
    WorkOrderJob:
      description: Represents a base model of work order job that has the basic fields of a job
      required:
        - id
        - type
        - jobNumber
        - scheduledTime
        - status
      properties:
        id:
          description: The unique identifier of this job. Generated by vintrace
          type: integer
        type:
          description: The type of this work order job
          type: string
          enum:
            - WINERY
            - MRP
        jobNumber:
          description: The sequence of this job in the work order
          type: number
          format: double
        status:
          description: The status of this job
          type: string
          enum:
            - INCOMPLETE
            - ASSIGNED
            - COMPLETED
            - ROLLBACK_REPLAY
            - IN_PROGRESS
            - PENDING_APPROVAL
        scheduledTime:
          description: When this work order job is scheduled for.
          type: integer
          format: int64
        finishedTime:
          description: When this work order job is finished.
          type: integer
          format: int64
        link:
          description: Contain the link to get details of this job
          allOf:
            - $ref: '#/components/schemas/ResourceLink'
    WineryWorkOrderJob:
      description: 'Represents the winery operation that can be added to work order such as bulk intake, tirage and so on.'
      allOf:
        - $ref: '#/components/schemas/WorkOrderJob'
        - properties:
            operationType:
              description: The type of this winery job
              type: string
    ResourceLink:
      description: Contains the information of a hyper link to the resource
      properties:
        href:
          description: Contains the absolute or relative hyperlink to the resource
          type: string
        rel:
          description: Contains a text that describes what this entity is
          type: string
        method:
          description: Contains the HTTP method that should be used to access this related resource
          type: string
    TirageSuccessResponse:
      description: The response object for tirage operation
      properties:
        data:
          $ref: '#/components/schemas/Tirage'
    ScheduleOperationDetails:
      description: An object that contains basic details of operation. Designed for extending.
      type: object
      properties:
        id:
          description: The id of this operation. This field can be null when this operation scheduled in work order is not completed yet.
          type: integer
        workOrderNumber:
          description: The work order number in which this operation is scheduled.
          type: string
          example: TWL-123
        jobNumber:
          description: The job number of this operation in the scheduled work order.
          type: integer
          example: 1
        occurredTime:
          description: |
            The time when this operation occurs. Time is returned in epoch milliseconds.

            This field can contain a future date when the operation is scheduled in a work order.
          type: integer
          format: int64
        modifiedTime:
          description: |
            The last modified time of this operation. Time is returned in epoch milliseconds

            This field can be null when the operation hasn't occurred.
          type: integer
          format: int64
        operator:
          $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        reversed:
          description: The flag that indicates if this operation has been reversed
          type: boolean
    Tirage:
      description: The object that contains details of a tirage operation
      allOf:
        - $ref: '#/components/schemas/ScheduleOperationDetails'
      properties:
        groupName:
          description: The group name of produced bottles
          type: string
        sourceWine:
          $ref: '#/components/schemas/TirageSourceWineDetails'
        outVolume:
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
        loss:
          $ref: '#/components/schemas/WineTransferLoss'
        package:
          $ref: '#/components/schemas/TiragePackageDetails'
    WineTransferLoss:
      description: An object that contains the details of wine loss during transfer
      type: object
      properties:
        volume:
          $ref: common-schemas.yaml#/components/schemas/Measurement
        reason:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
    TirageSourceWineDetails:
      description: The source where the wines are drew off
      type: object
      properties:
        vessel:
          description: The name of the vessel
          type: string
        batch:
          description: The batch that contains the vessel
          type: string
        designatedProduct:
          description: The designated product of the source batch
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/CodedIdentifiableEntity
        productionYear:
          description: The production year of the source batch
          type: string
        winery:
          $ref: common-schemas.yaml#/components/schemas/Winery
        wineryBuilding:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
    TiragePackageDetails:
      description: The object that contains the Tirage/Packing details.
      type: object
      properties:
        quantity:
          description: The quantity that's been packaged
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
        tirageItem:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        tirageBatch:
          type: string
        totalPackagedVolume:
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/Measurement
    MoveBarrelsRequest:
      description: Request object for move barrels
      allOf:
        - $ref: '#/components/schemas/MoveBarrels'
    MoveBarrelsResponse:
      description: Response object for move barrels
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MoveBarrelsResponseData'
    MoveBarrelsResponseData:
      type: object
      allOf:
        - $ref: '#/components/schemas/MoveBarrels'
      properties:
        id:
          description: |
            The unique identifier of this resource. It is generated by vintrace internally. 
            Only used for operation task.
          type: integer
        modifiedTime:
          description: |
            The last modified time of this operation. Time is returned in epoch milliseconds. 
            Only used for operation task.
          type: integer
          format: int64
    MoveBarrels:
      type: object
      required:
        - movements
      properties:
        userActions:
          x-internal: true
          type: array
          items:
            type: string
            x-sl-internally-excluded: true
            x-sl-error-message: You do not have permission to view this reference
        occurredTime:
          description: Defaults to the current system time if not provided.
          type: integer
          format: int64
        operator:
          description: The initiator of this action. Defaults to the current system user if not provided.
          allOf:
            - $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        operatorNotes:
          description: the notes of the operator (ignored when moving empty barrels).
          type: string
        documentIds:
          description: the document ids of this operation (ignored when moving an empty barrels).
          type: array
          items:
            type: integer
        targetBatch:
          description: The batch that the vessel change to
          type: string
        additionalInstructions:
          description: The additional instructions
          type: string
        movements:
          type: array
          items:
            type: object
            properties:
              vessel:
                description: barrel or barrel group
                allOf:
                  - $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
              newStorageAreas:
                type: array
                items:
                  $ref: '#/components/schemas/NewDestinationStorageArea'
    NewDestinationStorageArea:
      type: object
      allOf:
        - $ref: common-schemas.yaml#/components/schemas/StackCoordinates
      properties:
        vesselToMove:
          description: Only available when fixed barrel coords system policy and feature are enabled
          type: string
    WineBatchData:
      type: object
      properties:
        id:
          description: The unique internal identifier of this wine batch generated by system
          type: integer
          readOnly: true
        batchCode:
          description: The code for this batch. Defaults to auto code if not provided.
          type: string
        batchNumber:
          description: The number for this batch.
          type: string
        description:
          description: The description for this batch.
          type: string
        productionYear:
          description: The vintage for this batch. Defaults to the DEFAULT_VINTAGE in setting if not provided.
          type: integer
        owner:
          $ref: common-schemas.yaml#/components/schemas/ExtIdentifiableEntity
        grading:
          $ref: common-schemas.yaml#/components/schemas/GradingValue
        program:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        designatedRegion:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        designatedSubRegion:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        designatedVariety:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        winery:
          $ref: common-schemas.yaml#/components/schemas/Winery
        category:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        designatedProduct:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        costsTrackedPercentage:
          description: The costs tacked (%) for this batch.
          type: number
          format: double
          default: 100
        ageOfSpirits:
          description: The age of spirits for this batch.
          type: string
        serviceOrder:
          $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
        fractionType:
          $ref: '#/components/schemas/FractionType'
        inactive:
          type: boolean
          default: false
        vessels:
          description: List of vessels where the batch hold liquid
          readOnly: true
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              type:
                description: The vessel type
                type: string
                enum:
                  - TANK
                  - BIN
                  - BARREL
                  - BARREL_GROUP
                  - BIN_GROUP
                  - PRESS
                  - TANKER
              amount:
                $ref: common-schemas.yaml#/components/schemas/Measurement
        allocations:
          description: The latest allocations of the wine batch
          readOnly: true
          type: array
          items:
            $ref: common-schemas.yaml#/components/schemas/AllocationSlice
    GetWineBatchSuccessResponse:
      type: object
      allOf:
        - $ref: common-schemas.yaml#/components/schemas/Shared-openapi_PageRoot
        - type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/WineBatchData'
    CreateWineBatchSuccessResponse:
      description: The response object when successfully creating a batch
      properties:
        data:
          $ref: '#/components/schemas/WineBatchData'
    CreateWineBatchRequest:
      description: Request object for creating wine batch
      required:
        - batchCode
        - vintage
        - winery
        - owner
      allOf:
        - $ref: '#/components/schemas/WineBatchData'
    AttachDocumentsRequest:
      description: Request object for attaching documents to a process
      properties:
        processId:
          description: The unique identifier for the process
          type: integer
        documentIds:
          description: The unique identifiers for the documents
          type: array
          items:
            type: integer
    AttachDocumentsSuccessResponse:
      description: The response object when successfully uploading documents
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: common-schemas.yaml#/components/schemas/IdentifiableEntity
          description: A list of document objects
        process:
          type: object
          description: Represents the process associated with the documents
          properties:
            id:
              type: integer
              description: The unique identifier of the process
            type:
              type: string
              enum:
                - EXTRACTION
                - BLEND
                - TRIAL_BLEND
                - LIQUID_TRANSFER
                - DELIVERY
                - SAMPLING
                - START_FERMENT
                - STOP_FERMENT
                - MEASUREMENT
                - ANALYSIS
                - ADDITION
                - BATCHCREATE
                - RACKING
                - RACK_AND_RETURN
                - RACK_TO_BARREL_GROUP
                - PACKAGING_RUN
                - PRODUCT_TREATMENT
                - EQUIPMENT_TREATMENT
                - PRESS_CYCLE
                - CREATE_STOCK
                - TASTING_NOTE
                - IMPORT_COMPOSITION
                - LIQUIDBATCHCREATE
                - BREAK_AND_TOP
                - TOPPING
                - MOVE_TO_BATCH
                - TASK
                - BULK_DISPATCH
                - RESURRECT
                - CHANGE_OWNER
                - BULK_INTAKE
                - BARREL_TREATMENT
                - REVERSE_BLEND
                - INTAKE_CORRECTION
                - REVERSE_EXTRACTION
                - FIXUP
                - NEW_PACKAGING_RUN
                - NEW_BULK_DISPATCH
                - TIRAGE
                - RIDDLING
                - TIRAGE_ADMIN
                - MULTI_TRANSFER
                - MULTI_TOPPING
                - MULTI_ADDITION
                - BIN_TRANSFER_BLEND
                - BLEND_TRANSFER
                - INTER_WINERY_BULK_DISPATCH
              description: The type of the winery process
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: 'Refer to https://support.vintrace.com/hc/en-us/articles/4407443037711-Manage-and-create-API-tokens for more info'
  parameters:
    CorrelationId:
      name: correlation-id
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: Optional unique identifier associated with the transaction
      example: d308faac-66e1-47df-a9ff-fbe61b4e8974
    BookingId:
      name: bookingId
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of this booking. It accepts the id generated by vintrace or the unique booking number stored in the record
      examples:
        vintrace-generated-id:
          value: '1232342'
        external-id:
