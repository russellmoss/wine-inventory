openapi: 3.0.3
info:
  title: Vintrace Operation API
  description: ''
  version: 1.0.0
servers:
  - url: 'https://oz50.vintrace.net/vinx2/api/v7/operation'
    description: Example production url
  - url: 'https://sandbox.vintrace.net/vinx2demo/api/v7/operation'
    description: Example sandbox url
security:
  - bearerAuth: []
paths:
  /shipments:
    parameters:
      - $ref: '#/components/parameters/CorrelationId'
    get:
      summary: Get all shipments in the system
      description: This endpoint returns all the shipments created by Bulk Dispatch and Inter-winery dispatch operations.
      parameters:
        - $ref: '#/components/parameters/PaginationLimit'
        - $ref: '#/components/parameters/PaginationOffset'
        - $ref: '#/components/parameters/ModifiedSince'
        - $ref: '#/components/parameters/ModifiedBefore'
        - name: type
          in: query
          required: false
          schema:
            type: string
            example: BULK
          description: Filter the shipments by the operation type.
        - name: dispatchType
          in: query
          required: false
          schema:
            type: string
            example: 'Bottling,Bulk Sale'
          description: |
            Filter the shipments by the dispatch type. 

            Note, the comma is used as delimiter in this param and will conflict if the name dispatch type entity in Vintrace has a comma.
        - name: freightCode
          in: query
          required: false
          schema:
            type: string
            example: 'FC1,FC2'
          description: |
            Filter the shipments by the name of freight code entity.

            Note, the comma is used as delimiter in this param and will conflict if the name has a comma.
        - name: include
          in: query
          required: false
          schema:
            type: string
            example: 'allocations,metrics,cost,composition'
          description: 'By default, allocations, metrics, composition and cost won''t be included in the wine details unless requested using this query param'
      responses:
        '200':
          description: Success
          headers:
            correlation-id:
              description: Unique identifier associated with the transaction
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetShipmentsSuccessResponse'
              examples:
                successShipmentsResponse:
                  value:
                    totalResults: 1000
                    offset: 0
                    limit: 10
                    first: '/api/v7/operation/shipments?offset=0&limit=10&include=allocations,metrics,cost'
                    previous: null
                    next: '/api/v7/operation/shipments?offset=10&limit=10&include=allocations,metrics,cost'
                    last: '/api/v7/operation/shipments?offset=990&limit=10&include=allocations,metrics,cost'
