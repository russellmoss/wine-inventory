name: Brain Refresh (docs)

# LOOP 1 — Brain-freshness.
# Nightly, checks whether architecturally significant code changed since the last
# refresh (tracked in docs/.brain-refresh-marker). If so, updates the system map +
# registers and opens a PR. Never edits main directly. See docs/AUTOMATION.md.

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC daily
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

permissions:
  contents: write
  pull-requests: write
  id-token: write        # required by claude-code-action (OIDC)

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # need history to diff against the marker SHA

      - name: Configure Git
        run: |
          git config user.name "claude-brain-bot"
          git config user.email "claude-brain-bot@users.noreply.github.com"

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You maintain this repo's living docs ("the brain") in docs/architecture/.

            STEP 1 — decide if a refresh is needed:
            - Read the SHA in docs/.brain-refresh-marker (call it LAST).
            - Run: git diff --name-only LAST..HEAD
            - Consider it SIGNIFICANT if any changed path matches:
              prisma/schema.prisma, prisma/migrations/, or
              src/lib/(tenant|ledger|transform|cost|compliance|auth).
            - If NOTHING significant changed, STOP NOW. Do not commit, do not open a PR.

            STEP 2 — check for INVARIANT DRIFT (stale safety rules):
            - Run: node scripts/check-invariant-drift.mjs
              (deterministic; it diffs the marker..HEAD and flags invariants in
              docs/architecture/invariants/ whose GOVERNED code changed but whose NOTE did not
              — the case verify:invariants can't catch, because a guard still *exists* while the
              written statement may have gone stale, which would make the auto-context hook inject
              a WRONG rule).
            - For EACH flagged invariant: read the changed governed files, and decide if the note's
              statement / verify: guard / appliesTo still matches reality. If it drifted, UPDATE the
              note in docs/architecture/invariants/ AND the matching line in INVARIANTS.md. If the
              code change implies a genuinely NEW invariant, add a note (with a real verify: guard
              that exists). If the note is still accurate, leave it (the review itself clears it).
            - Do NOT fabricate guards. After edits, run: npm run verify:invariants — it must be green.
            - If the drift check reported nothing AND nothing significant changed, STOP (see STEP 1).

            STEP 3 — if significant, refresh the docs to match the current code:
            - Update docs/architecture/system-map.md so subsystems/paths are accurate.
            - Append any newly-implied risks to docs/architecture/scale-register.md and
              docs/architecture/security-register.md (do not delete existing entries).
            - Keep the writing plain-English and concise; preserve the [[wikilinks]].
            - Overwrite docs/.brain-refresh-marker with the current HEAD SHA
              (git rev-parse HEAD).

            STEP 4 — open a PR (do NOT merge, do NOT push to main):
            - Create a branch bot/brain-refresh-<short-sha>, commit with message
              "docs(brain): auto-refresh system map + registers + invariants", and open a PR to
              main titled the same, describing what changed and why (call out any invariant notes
              you updated for drift).
          claude_args: |
            --allowedTools "Read,Edit,Write,Bash"
            --max-turns 30
            --model claude-opus-4-8

      # Deterministic gate on the brain edits: after the loop runs (STEP 2 may add
      # or edit invariant notes), every invariant's verify: guard must still exist —
      # the checker can't be skipped the way the in-prompt instruction can. Runs even
      # if the loop errored, so a fabricated/renamed guard fails the workflow loudly.
      # Pure Node, no install/DB needed. The PR the loop opens also hits this in ci.yml.
      - uses: actions/setup-node@v4
        if: always()
        with:
          node-version: 20
      - name: Verify invariant guards intact
        if: always()
        run: npm run verify:invariants
